name: macOS Release Artifact

on:
  push:
    branches:
      - embedr/release
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos-universal:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build macOS universal
        run: |
          rustup target add x86_64-apple-darwin aarch64-apple-darwin
          cargo build --release -p pcb --target x86_64-apple-darwin
          cargo build --release -p pcb --target aarch64-apple-darwin
          mkdir -p target/release
          lipo -create \
            target/x86_64-apple-darwin/release/pcb \
            target/aarch64-apple-darwin/release/pcb \
            -output target/release/pcb

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp target/release/pcb dist/pcb-macos-universal
          shasum -a 256 dist/* > dist/SHA256SUMS-macos-universal.txt

      - uses: actions/upload-artifact@v4
        with:
          name: pcb-macos-universal
          path: dist/*
