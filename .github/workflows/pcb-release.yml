name: Release pcb shim

on:
  push:
    tags:
      - 'pcb/v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'pcb shim release tag, such as pcb/v0.1.0'
        required: true
        type: string
      dry_run:
        description: 'Build artifacts without publishing to S3'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  prepare:
    runs-on: ubicloud-standard-16
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.dry_run && github.ref_name || inputs.tag || github.ref_name }}
          submodules: recursive

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-bin: false

      - id: release
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag || github.ref_name }}"
          case "$tag" in
            pcb/v*) version="${tag#pcb/v}" ;;
            *) echo "Unsupported pcb shim release tag: $tag" >&2; exit 1 ;;
          esac

          actual=$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.name == "pcb") | .version')
          if [ "$actual" != "$version" ]; then
            echo "pcb version is $actual, but tag requests $version" >&2
            exit 1
          fi

          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    name: build pcb (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15-xlarge
          - target: x86_64-apple-darwin
            runner: macos-15-large
          - target: aarch64-unknown-linux-gnu
            runner: ubicloud-standard-16-arm
          - target: aarch64-unknown-linux-musl
            runner: ubicloud-standard-16-arm
          - target: x86_64-unknown-linux-gnu
            runner: ubicloud-standard-16
          - target: x86_64-unknown-linux-musl
            runner: ubicloud-standard-16
          - target: x86_64-pc-windows-msvc
            runner: diode-windows
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Enable Windows long paths
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true

      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.dry_run && github.ref_name || needs.prepare.outputs.tag }}
          submodules: recursive

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-bin: false
          rustflags: ""
          toolchain: ${{ runner.os == 'Windows' && 'stable-x86_64-pc-windows-msvc' || 'stable' }}
          target: ${{ matrix.target }}

      - name: Install Linux musl build dependencies
        if: contains(matrix.target, 'linux-musl')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev

      - name: Install zstd
        shell: bash
        run: |
          set -euo pipefail
          if command -v zstd >/dev/null; then
            exit 0
          fi
          case "${{ runner.os }}" in
            Linux)
              sudo apt-get update
              sudo apt-get install -y zstd
              ;;
            macOS)
              brew install zstd
              ;;
            Windows)
              choco install zstandard -y
              ;;
          esac

      - name: Build
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          if [[ "$TARGET" == *linux-musl ]]; then
            export CC=musl-gcc
            export RUSTFLAGS="-C linker=musl-gcc"
            export CFLAGS="-Du_int8_t=uint8_t -Du_int16_t=uint16_t -Du_int32_t=uint32_t -Du_int64_t=uint64_t"
          fi
          cargo build --profile dist -p pcb --bin pcb --target "$TARGET"

      - name: Prepare artifacts
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          exe=pcb
          artifact="pcb-$TARGET"
          if [[ "$TARGET" == *windows* ]]; then
            exe=pcb.exe
            artifact="$artifact.exe"
          fi
          cp "target/$TARGET/dist/$exe" "artifacts/$artifact"
          zstd -q -f -3 "artifacts/$artifact" -o "artifacts/$artifact.zst"
          if command -v shasum >/dev/null; then
            shasum -a 256 "artifacts/$artifact" > "artifacts/$artifact.sha256"
          else
            sha256sum "artifacts/$artifact" > "artifacts/$artifact.sha256"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pcb-${{ matrix.target }}
          path: artifacts/*

  publish:
    needs:
      - prepare
      - build
    runs-on: ubicloud-standard-16
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.dry_run && github.ref_name || needs.prepare.outputs.tag }}

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: pcb-*
          path: artifacts
          merge-multiple: true

      - name: Configure AWS credentials
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_PCB_RELEASE_S3_ROLE_ARN }}
          aws-region: us-east-1

      - name: Upload artifacts to S3
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
        run: |
          aws s3 sync artifacts/ "s3://diode-pcb-releases/pcb/${{ needs.prepare.outputs.tag }}/" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Publish latest shim metadata
        if: ${{ needs.prepare.outputs.prerelease == 'false' && (github.event_name != 'workflow_dispatch' || inputs.dry_run != true) }}
        run: |
          jq -n \
            --arg version "${{ needs.prepare.outputs.version }}" \
            --arg tag "${{ needs.prepare.outputs.tag }}" \
            --arg published_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg base_url "https://pcb.api.diode.computer/pcb/${{ needs.prepare.outputs.tag }}" \
            '{ version: $version, tag: $tag, published_at: $published_at, base_url: $base_url }' > pcb-latest.json
          aws s3 cp pcb-latest.json "s3://diode-pcb-releases/pcb/pcb-latest.json" \
            --cache-control "public, max-age=60" \
            --content-type "application/json"
