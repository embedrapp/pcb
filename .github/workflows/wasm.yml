name: WASM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  KICAD_VERSION: 10.0.4

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wasm:
    name: Evaluate publish bundles
    runs-on: ubicloud-standard-16
    container:
      image: ghcr.io/diodeinc/kicad:10.0.4
      options: --user root
    timeout-minutes: 30
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y ca-certificates curl build-essential pkg-config libssl-dev jq git openssh-client zstd

      - uses: actions/checkout@v5

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
          cache-bin: false

      - uses: taiki-e/install-action@wasm-pack

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install local pcb toolchain
        run: |
          ./install.sh --local
          export PATH="$HOME/.local/bin:$PATH"
          pcb +local --help

      - name: Prepare stdlib artifact
        run: tar -C lib/std -cf - . | zstd -q -3 -c > "$RUNNER_TEMP/stdlib.tar.zst"

      - name: Build WASM bundle
        run: ./bin/build-wasm-bundle.sh

      - name: Check WASM artifact size
        run: |
          WASM_FILE="target/wasm-bundle/pcb_zen_wasm_bg.wasm"

          if [ ! -f "$WASM_FILE" ]; then
            echo "Error: WASM artifact not found"
            exit 1
          fi

          # Get file size in bytes
          SIZE=$(stat -c%s "$WASM_FILE" 2>/dev/null || stat -f%z "$WASM_FILE")
          SIZE_MB=$((SIZE / 1024 / 1024))

          echo "WASM bundle size: ${SIZE_MB}MB"
          ls -lh "$WASM_FILE"

          # Fail if size exceeds 30MB
          if [ $SIZE -gt 31457280 ]; then
            echo "Error: WASM bundle is too large (${SIZE_MB}MB > 30MB)"
            exit 1
          fi

          echo "WASM bundle size is within limits."

      - name: Checkout board workspaces
        run: |
          key="$RUNNER_TEMP/code-diode-key"
          ssh-keygen -q -t ed25519 -N '' -f "$key"
          export GIT_SSH_COMMAND="ssh -o BatchMode=yes -o IdentitiesOnly=yes -o IdentityFile=$key -o IdentityAgent=none -o StrictHostKeyChecking=accept-new"
          git clone --depth 1 git@code.diode.computer:demo/b/Demeter workspaces/Demeter
          git clone --depth 1 git@code.diode.computer:demo/b/Feign workspaces/Feign

      - name: Evaluate publish bundles with WASM
        run: |
          for board in Demeter Feign; do
            node crates/pcb-zen-wasm/scripts/eval-publish-bundle.mjs \
              --publish "workspaces/$board/$board.zen" \
              --pcbc pcb \
              --pcbc-arg +local \
              --stdlib "$RUNNER_TEMP/stdlib.tar.zst" \
              > "$RUNNER_TEMP/$board-wasm-netlist.json"
          done
