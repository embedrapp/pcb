name: Release pcbc

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'pcbc release tag, such as v0.3.83'
        required: true
        type: string
      dry_run:
        description: 'Build artifacts without publishing to S3 or GitHub Releases'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  prepare:
    runs-on: ubicloud-standard-16
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.dry_run && github.ref_name || inputs.tag || github.ref_name }}
          submodules: recursive

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-bin: false

      - id: release
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag || github.ref_name }}"
          case "$tag" in
            v*) version="${tag#v}" ;;
            *) echo "Unsupported pcbc release tag: $tag" >&2; exit 1 ;;
          esac

          actual=$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.name == "pcbc") | .version')
          if [ "$actual" != "$version" ]; then
            echo "pcbc version is $actual, but tag requests $version" >&2
            exit 1
          fi

          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Prepare stdlib source archive
        run: |
          set -euo pipefail
          if ! command -v zstd >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y zstd
          fi
          mkdir -p artifacts
          git archive --format=tar HEAD:lib/std | zstd -q -3 -c > artifacts/stdlib.tar.zst
          sha256sum artifacts/stdlib.tar.zst > artifacts/stdlib.tar.zst.sha256

      - name: Upload stdlib source archive
        uses: actions/upload-artifact@v7
        with:
          name: pcbc-stdlib
          path: artifacts/stdlib.tar.zst*

  build:
    needs: prepare
    name: build pcbc (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15-xlarge
          - target: x86_64-apple-darwin
            runner: macos-15-large
          - target: aarch64-unknown-linux-gnu
            runner: ubicloud-standard-16-arm
          - target: aarch64-unknown-linux-musl
            runner: ubicloud-standard-16-arm
          - target: x86_64-unknown-linux-gnu
            runner: ubicloud-standard-16
          - target: x86_64-unknown-linux-musl
            runner: ubicloud-standard-16
          - target: x86_64-pc-windows-msvc
            runner: diode-windows
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Enable Windows long paths
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true

      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.dry_run && github.ref_name || needs.prepare.outputs.tag }}
          submodules: recursive

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-bin: false
          rustflags: ""
          toolchain: ${{ runner.os == 'Windows' && 'stable-x86_64-pc-windows-msvc' || 'stable' }}
          target: ${{ matrix.target }}

      - name: Install Linux musl build dependencies
        if: contains(matrix.target, 'linux-musl')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev

      - name: Install zstd
        shell: bash
        run: |
          set -euo pipefail
          if command -v zstd >/dev/null; then
            exit 0
          fi
          case "${{ runner.os }}" in
            Linux)
              sudo apt-get update
              sudo apt-get install -y zstd
              ;;
            macOS)
              brew install zstd
              ;;
            Windows)
              choco install zstandard -y
              ;;
          esac

      - name: Build
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          if [[ "$TARGET" == *linux-musl ]]; then
            export CC=musl-gcc
            export RUSTFLAGS="-C linker=musl-gcc"
            export CFLAGS="-Du_int8_t=uint8_t -Du_int16_t=uint16_t -Du_int32_t=uint32_t -Du_int64_t=uint64_t"
          fi
          cargo build --profile dist -p pcbc --bin pcbc --target "$TARGET"
          cargo build --profile dist -p rectify --bin pcb-rectify --target "$TARGET"

      - name: Prepare artifacts
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          for bin in pcbc pcb-rectify; do
            exe="$bin"
            artifact="$bin-$TARGET"
            if [[ "$TARGET" == *windows* ]]; then
              exe="$bin.exe"
              artifact="$artifact.exe"
            fi
            cp "target/$TARGET/dist/$exe" "artifacts/$artifact"
            zstd -q -f -3 "artifacts/$artifact" -o "artifacts/$artifact.zst"
            if command -v shasum >/dev/null; then
              shasum -a 256 "artifacts/$artifact" > "artifacts/$artifact.sha256"
            else
              sha256sum "artifacts/$artifact" > "artifacts/$artifact.sha256"
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pcbc-${{ matrix.target }}
          path: artifacts/*

  publish:
    needs:
      - prepare
      - build
    runs-on: ubicloud-standard-16
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: pcbc-*
          path: artifacts
          merge-multiple: true

      - name: Configure AWS credentials
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_PCB_RELEASE_S3_ROLE_ARN }}
          aws-region: us-east-1

      - name: Upload artifacts to S3
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
        run: |
          # Upload every artifact first. None of this is discoverable yet: the
          # shim only resolves versions that have a completion marker under
          # pcb/index/ (written by the next step), so a partially-synced release
          # is invisible.
          aws s3 sync artifacts/ "s3://diode-pcb-releases/pcb/${{ needs.prepare.outputs.tag }}/" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Publish release completion marker
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
        run: |
          # Single atomic PutObject that "commits" the release. Written last, so
          # the shim never resolves a half-uploaded version. The shim only keys
          # off the marker's presence; the body is informational.
          jq -n \
            --arg version "${{ needs.prepare.outputs.version }}" \
            --arg tag "${{ needs.prepare.outputs.tag }}" \
            --arg published_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{ version: $version, tag: $tag, published_at: $published_at }' > release.json
          aws s3 cp release.json "s3://diode-pcb-releases/pcb/index/${{ needs.prepare.outputs.tag }}" \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/json"

      - name: Create GitHub release
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          prerelease_flag=""
          if [ "${{ needs.prepare.outputs.prerelease }}" = "true" ]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "${{ needs.prepare.outputs.tag }}" \
            --verify-tag \
            $prerelease_flag \
            --title "${{ needs.prepare.outputs.version }} - $(date -u +%Y-%m-%d)" \
            --notes "Release ${{ needs.prepare.outputs.tag }}" \
            artifacts/*
