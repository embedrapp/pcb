[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = true
# Which actions to run on pull requests
pr-run-mode = "skip"
# Additional build setup steps for generated release workflow
github-build-setup = "../build-setup.yml"

[dist.github-custom-runners]
global = "ubuntu-22.04"
x86_64-apple-darwin = "macos-15-intel"
aarch64-apple-darwin = "macos-14"
x86_64-pc-windows-msvc = "windows-2022"
x86_64-unknown-linux-gnu = "ubuntu-22.04"
aarch64-unknown-linux-gnu = "ubuntu-24.04-arm"

[[dist.extra-artifacts]]
build = ["sh", "-c", "rustup target add wasm32-wasip2 && cargo build -p pcb-zen-wasm --bin pcb-zen-wasi --target wasm32-wasip2 --release"]
artifacts = ["target/wasm32-wasip2/release/pcb-zen-wasi.wasm"]
